services:
  kg-pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kg-pipeline
    env_file:
      - ../.env
    environment:
      KG_STORAGE_ROOT_DIR: /app/db_sample/Neo4j
      KG_NOTEBOOK_DIR: /app/notebooks
      KG_LOG_DIR: /app/runtime_logs
      KG_MANIFEST_DIR: /app/manifests
      KG_NEO4J_IMPORT_ROOT: /import
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-KGFramework_2026!}
    volumes:
      - ./src:/app/src
      - ../DB/Sample_Data:/app/db_sample
      - ./manifests:/app/manifests
      - ./notebooks:/app/notebooks
      - ./scripts:/app/scripts
      - ../Logs/KG_Logs:/app/runtime_logs
    depends_on:
      neo4j:
        condition: service_healthy
    command: ["python", "-m", "kg_framework.cli", "run-all"]

  kg-tests:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kg-tests
    env_file:
      - ../.env
    environment:
      KG_STORAGE_ROOT_DIR: /app/db_sample/Neo4j
      KG_NOTEBOOK_DIR: /app/notebooks
      KG_LOG_DIR: /app/runtime_logs
      KG_MANIFEST_DIR: /app/manifests
      KG_NEO4J_IMPORT_ROOT: /import
      PYTHONPATH: /app/src
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-KGFramework_2026!}
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ../DB/Sample_Data:/app/db_sample
      - ./manifests:/app/manifests
      - ../Logs/KG_Logs:/app/runtime_logs
    command: ["pytest", "-q"]
    profiles: ["test"]

  neo4j:
    image: neo4j:5.26-community
    container_name: kg-neo4j
    environment:
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-KGFramework_2026!}
      NEO4J_server_memory_heap_initial__size: ${KG_NEO4J_HEAP_INITIAL:-512M}
      NEO4J_server_memory_heap_max__size: ${KG_NEO4J_HEAP_MAX:-1G}
      NEO4J_server_default__listen__address: 0.0.0.0
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    ports:
      - "${KG_NEO4J_HTTP_PORT:-7475}:7474"
      - "${KG_NEO4J_BOLT_PORT:-7688}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ../DB/Sample_Data/Neo4j:/import
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USERNAME:-neo4j} -p ${NEO4J_PASSWORD:-KGFramework_2026!} 'RETURN 1;'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  neo4j_data:
  neo4j_logs:
